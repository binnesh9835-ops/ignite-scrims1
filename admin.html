<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2 style="text-align:center;">🔥 Admin Dashboard</h2>

<div class="wallet-stats">

  <div class="gold-box">
    👤 Monthly Users <br>
    <span id="monthlyUsers">0</span>
  </div>

  <div class="gold-box">
    💰 Monthly Transactions <br>
    ₹<span id="monthlyAmount">0</span>
  </div>

  <!-- ✅ CLICKABLE PENDING -->
  <div class="gold-box" onclick="openPending()">
    ⏳ Pending Requests <br>
    <span id="pendingCount">0</span>
  </div>

</div>

<!-- 📝 ADMIN HISTORY -->
<div class="card" style="margin:20px;">
  <h3>📜 Admin Activity</h3>
  <div id="adminHistory">Loading...</div>
</div>

<!-- ✅ POPUP -->
<div id="pendingPopup" class="popup">
  <div class="popup-box">
    <h3>Pending Requests</h3>
    <div id="pendingList">Loading...</div>

    <button onclick="closePendingAdmin()">Close</button>
  </div>
</div>

<!-- 🔥 LOGOUT -->
<div style="text-align:center; margin-top:20px;">
  <button onclick="logout()" class="play-btn">Logout</button>
</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
