<!DOCTYPE html>
<html>

<head>

<title>IGNITE SCRIMS ADMIN</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:0;
}

header{
background:#1a1a1a;
padding:15px;
text-align:center;
}

.container{
display:flex;
}

.sidebar{
width:160px;
background:#1e1e1e;
height:100vh;
padding:10px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ff3c3c;
color:white;
}

.content{
flex:1;
padding:20px;
}

.matchCard{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:320px;
}

.popupBox input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

.popupBox button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.submitBtn{
background:#00ff9d;
color:black;
}

.cancelBtn{
background:red;
color:white;
}

</style>

</head>

<body>

<header>
<h2>IGNITE SCRIMS ADMIN</h2>
</header>

<div class="container">

<div class="sidebar">

<button onclick="openPopup()">Add Match</button>

</div>

<div class="content">

<h3>Home Feed</h3>

<div id="homeFeed"></div>

</div>

</div>

<!-- ADD MATCH POPUP -->

<div id="matchPopup" class="popup">

<div class="popupBox">

<h3>Add Match</h3>

<input id="matchTitle" placeholder="Match Title">

<input id="matchPrice" placeholder="Price (INR)">

<input id="matchSlots" placeholder="Slots">

<input type="date" id="matchDate">

<input type="time" id="matchTime">

<button class="submitBtn" onclick="addMatch()">Submit</button>

<button class="cancelBtn" onclick="closePopup()">Cancel</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
authDomain: "ignite-scrims.firebaseapp.com",
projectId: "ignite-scrims",
storageBucket: "ignite-scrims.firebasestorage.app",
messagingSenderId: "497561769270",
appId: "1:497561769270:web:ef4f215a253e984f2dcf97"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* popup */

window.openPopup=function(){

document.getElementById("matchPopup").style.display="flex"

}

window.closePopup=function(){

document.getElementById("matchPopup").style.display="none"

}

/* add match */

window.addMatch=async function(){

const title=document.getElementById("matchTitle").value
const price=document.getElementById("matchPrice").value
const slots=document.getElementById("matchSlots").value
const date=document.getElementById("matchDate").value
const time=document.getElementById("matchTime").value

if(!title || !price){

alert("Fill all details")
return

}

await addDoc(collection(db,"matches"),{

title:title,
price:price,
slots:slots,
date:date,
time:time

})

closePopup()

}

/* home feed */

const feed=document.getElementById("homeFeed")

onSnapshot(collection(db,"matches"),(snapshot)=>{

feed.innerHTML=""

snapshot.forEach((doc)=>{

const m=doc.data()

const div=document.createElement("div")

div.className="matchCard"

div.innerHTML=
<h3>${m.title}</h3>
<p>₹${m.price}</p>
<p>Slots: ${m.slots}</p>
<p>${m.date} | ${m.time}</p>


feed.appendChild(div)

})

})

</script>

</body>
</html>
