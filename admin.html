<!DOCTYPE html>
<html>

<head>

<title>IGNITE SCRIMS ADMIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:0;
}

header{
background:#1a1a1a;
padding:15px;
text-align:center;
}

.container{
display:flex;
}

.sidebar{
width:160px;
background:#1e1e1e;
height:100vh;
padding:10px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ff3c3c;
color:white;
}

.content{
flex:1;
padding:20px;
}

.matchCard{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.matchCard img{
width:100%;
border-radius:6px;
margin-bottom:10px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:320px;
}

.popupBox input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

.popupBox button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.submitBtn{
background:#00ff9d;
color:black;
}

.cancelBtn{
background:red;
color:white;
}

.editBtn{
background:#ffaa00;
margin-top:10px;
}

</style>

</head>

<body>

<header>
<h2>IGNITE SCRIMS ADMIN</h2>
</header>

<div class="container">

<div class="sidebar">

<button onclick="document.getElementById('matchPopup').style.display='flex'">
Add Match
</button>

</div>

<div class="content">

<h3>Home Feed</h3>

<div id="homeFeed"></div>

</div>

</div>


<!-- ADD MATCH POPUP -->

<div id="matchPopup" class="popup">

<div class="popupBox">

<h3>Add Match</h3>

<input id="matchTitle" placeholder="Match Title">

<input id="matchPrice" placeholder="Price (INR)">

<input id="matchSlots" placeholder="Slots">

<input type="date" id="matchDate">

<input type="time" id="matchTime">

<input id="matchThumb" placeholder="Thumbnail Image URL">

<input id="roomId" placeholder="Room ID (optional)">

<input id="roomPass" placeholder="Room Password (optional)">

<button class="submitBtn" id="submitMatch">Submit</button>

<button class="cancelBtn"
onclick="document.getElementById('matchPopup').style.display='none'">
Cancel
</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
authDomain: "ignite-scrims.firebaseapp.com",
projectId: "ignite-scrims",
storageBucket: "ignite-scrims.firebasestorage.app",
messagingSenderId: "497561769270",
appId: "1:497561769270:web:ef4f215a253e984f2dcf97"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* ADD MATCH */

document.getElementById("submitMatch").addEventListener("click", async ()=>{

const title=document.getElementById("matchTitle").value
const price=document.getElementById("matchPrice").value
const slots=document.getElementById("matchSlots").value
const date=document.getElementById("matchDate").value
const time=document.getElementById("matchTime").value
const thumb=document.getElementById("matchThumb").value
const roomId=document.getElementById("roomId").value
const roomPass=document.getElementById("roomPass").value

if(!title || !price){

alert("Fill required details")
return

}

await addDoc(collection(db,"matches"),{

title:title,
price:price,
slots:slots,
date:date,
time:time,
thumb:thumb,
roomId:roomId,
roomPass:roomPass

})

document.getElementById("matchPopup").style.display="none"

alert("Match Added")

})


/* HOME FEED */

const feed=document.getElementById("homeFeed")

onSnapshot(collection(db,"matches"),(snapshot)=>{

feed.innerHTML=""

snapshot.forEach((docSnap)=>{

const m=docSnap.data()

const div=document.createElement("div")

div.className="matchCard"

div.innerHTML=`
<img src="${m.thumb || ''}">

<h3>${m.title}</h3>

<p>₹${m.price}</p>

<p>Slots: ${m.slots}</p>

<p>${m.date} | ${m.time}</p>

<p>Room ID: ${m.roomId || "Not Added"}</p>

<p>Password: ${m.roomPass || "Not Added"}</p>

<button class="editBtn">Edit Room ID / Pass</button>

`

div.querySelector(".editBtn").onclick=async()=>{

const newRoom=prompt("Enter Room ID")
const newPass=prompt("Enter Password")

await updateDoc(doc(db,"matches",docSnap.id),{

roomId:newRoom,
roomPass:newPass

})

}

feed.appendChild(div)

})

})

</script>

</body>
</html>
