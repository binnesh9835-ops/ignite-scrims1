<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2 style="text-align:center;">🔥 Admin Dashboard</h2>

<div class="wallet-stats">

  <div class="gold-box">
    👤 Monthly Users <br>
    <span id="monthlyUsers">0</span>
  </div>

  <div class="gold-box">
    💰 Monthly Transactions <br>
    ₹<span id="monthlyAmount">0</span>
  </div>

  <!-- ✅ ONLY ONE PENDING BUTTON -->
  <div class="gold-box" onclick="openPending()">
    ⏳ Pending Requests <br>
    <span id="pendingCount">0</span>
  </div>

</div> <!-- ✅ yaha close -->

<!-- 🎮 CREATE MATCH (OUTSIDE) -->
<div class="card" style="margin:20px;">
  <h3>Create Match</h3>

  <!-- 🔥 TYPE -->
  <select id="type">
    <option value="match">Match</option>
    <option value="tournament">Tournament</option>
  </select>

  <!-- 🔥 MODE -->
  <select id="mode">
    <option value="Solo">Solo</option>
    <option value="Duo">Duo</option>
    <option value="Squad">Squad</option>
  </select>

  <input type="number" id="entry" placeholder="Entry Fee ₹">
  <input type="number" id="perKill" placeholder="Per Kill ₹">
  <input type="number" id="booyah" placeholder="Booyah Bonus ₹">
  <input type="number" id="slots" placeholder="Total Slots">
  <input type="text" id="time" placeholder="Match Time (e.g. 9:00 PM)">

  <!-- 🔥 RULES -->
  <textarea id="rules" placeholder="Enter match rules..." style="width:100%; height:80px;"></textarea>

  <button onclick="createMatch()" class="play-btn" style="margin-top:10px;">
    Create Match
  </button>
</div>

<!-- 📝 ADMIN HISTORY -->
<div class="card" style="margin:20px;">
  <h3>📜 Admin Activity</h3>
  <div id="adminHistory">Loading...</div>
</div>

<!-- ✅ POPUP -->
<div id="pendingPopup" class="popup">
  <div class="popup-box">
    <h3>Pending Requests</h3>
    <div id="pendingList">Loading...</div>

    <button onclick="closePendingAdmin()">Close</button>
  </div>
</div>

<!-- 🔥 LOGOUT -->
<div style="text-align:center; margin-top:20px;">
  <button onclick="logout()" class="play-btn">Logout</button>
</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
