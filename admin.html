<!DOCTYPE html>
<html>
<head>
<title>IGNITE SCRIMS ADMIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:0;
}

header{
background:#1a1a1a;
padding:15px;
text-align:center;
}

.container{
display:flex;
}

.sidebar{
width:160px;
background:#1e1e1e;
height:100vh;
padding:10px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ff3c3c;
color:white;
}

.content{
flex:1;
padding:20px;
}

.section{
display:none;
}

.section.active{
display:block;
}

.payment{
background:#1e1e1e;
padding:15px;
margin-top:15px;
border-radius:10px;
}

button.approve{
background:green;
color:white;
margin-right:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

button.reject{
background:red;
color:white;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cutBtn{
background:red;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}

.saveBtn{
background:#00ff9d;
color:black;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>IGNITE SCRIMS ADMIN</h2>
</header>

<div class="container">

<div class="sidebar">

<button id="homeBtn">Home Feed</button>
<button id="addMatchBtn">Add Match</button>
<button id="paymentsBtn">Payments</button>

</div>

<div class="content">

<!-- HOME -->
<div id="homeSection" class="section active">

<h3>Welcome, Admin!</h3>
<p>Select a section from left.</p>

</div>


<!-- ADD MATCH -->
<div id="addMatchSection" class="section">

<button class="cutBtn" onclick="goHome()">Cut</button>

<h3>Add Match</h3>

<input id="title" placeholder="Match Title">

<input id="price" placeholder="Entry Price">

<input id="thumbnail" placeholder="Thumbnail URL">

<textarea id="rules" placeholder="Rules"></textarea>

<button class="saveBtn" id="saveMatch">Save Match</button>

</div>


<!-- PAYMENTS -->
<div id="paymentsSection" class="section">

<button class="cutBtn" onclick="goHome()">Cut</button>

<h3>Pending Payments</h3>

<div id="paymentsContainer"></div>

</div>

</div>
</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
authDomain: "ignite-scrims.firebaseapp.com",
projectId: "ignite-scrims",
storageBucket: "ignite-scrims.firebasestorage.app",
messagingSenderId: "497561769270",
appId: "1:497561769270:web:ef4f215a253e984f2dcf97"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



/* ---------- SECTION SWITCH ---------- */

const homeBtn=document.getElementById("homeBtn");
const addMatchBtn=document.getElementById("addMatchBtn");
const paymentsBtn=document.getElementById("paymentsBtn");

const homeSection=document.getElementById("homeSection");
const addMatchSection=document.getElementById("addMatchSection");
const paymentsSection=document.getElementById("paymentsSection");

function hideAll(){
homeSection.classList.remove("active");
addMatchSection.classList.remove("active");
paymentsSection.classList.remove("active");
}

homeBtn.onclick=()=>{
hideAll();
homeSection.classList.add("active");
}

addMatchBtn.onclick=()=>{
hideAll();
addMatchSection.classList.add("active");
}

paymentsBtn.onclick=()=>{
hideAll();
paymentsSection.classList.add("active");
}

window.goHome=()=>{
hideAll();
homeSection.classList.add("active");
}



/* ---------- ADD MATCH ---------- */

document.getElementById("saveMatch").onclick=async()=>{const title=document.getElementById("title").value
const price=document.getElementById("price").value
const thumbnail=document.getElementById("thumbnail").value
const rules=document.getElementById("rules").value

if(!title || !price){
alert("Fill details")
return
}

await setDoc(doc(db,"matches",title.replace(/\s/g,"_")),{

title:title,
price:price,
thumbnail:thumbnail,
rules:rules

})

alert("Match Added")

goHome()

}



/* ---------- PAYMENTS ---------- */

const container=document.getElementById("paymentsContainer")

onSnapshot(collection(db,"payments"),(snapshot)=>{

container.innerHTML=""

snapshot.forEach((docSnap)=>{

const data=docSnap.data()

if(data.status==="pending"){

const div=document.createElement("div")

div.className="payment"

div.innerHTML=

<p><b>Reference:</b> ${data.reference}</p>

<p><b>IGN:</b> ${data.ign}</p>

<p><b>Email:</b> ${data.email}</p>

<button class="approve">Approve</button>

<button class="reject">Reject</button>



div.querySelector(".approve").onclick=async()=>{

await updateDoc(doc(db,"payments",docSnap.id),{

status:"approved"

})

}

div.querySelector(".reject").onclick=async()=>{

await updateDoc(doc(db,"payments",docSnap.id),{

status:"rejected"

})

}

container.appendChild(div)

}

})

})

</script>

</body>
</html>
