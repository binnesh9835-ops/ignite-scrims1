<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Details</title>

<link rel="stylesheet" href="css/style.css">

<style>
.card {
    background: #111;
    padding: 15px;
    margin: 15px;
    border-radius: 12px;
    color: white;
}

#countdown {
    font-size: 18px;
    color: yellow;
}

.join-btn {
    background: limegreen;
    color: black;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 5px lime; }
    to { box-shadow: 0 0 20px lime; }
}

.loader {
    position: fixed;
    background: rgba(0,0,0,0.9);
    color: white;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size: 24px;
    z-index:999;
    display:none;
}
</style>
</head>

<body>

<div id="loader" class="loader">Checking Balance: 3</div>

<h2 style="text-align:center;">🎮 Match Details</h2>

<div class="card">
  <h2 id="mode"></h2>
  <p>💰 Entry: ₹<span id="entry"></span></p>
  <p>🎯 Per Kill: ₹<span id="perKill"></span></p>
  <p>🏆 Booyah: ₹<span id="booyah"></span></p>
  <p>🕒 Time: <span id="time"></span></p>
  <p>👥 Slots: <span id="slots">0</span></p>
</div>

<div class="card">
  <h3>📜 Rules</h3>
  <p id="rulesText"></p>
</div>

<div style="text-align:center;">
    <input id="teamInput" placeholder="Enter IGN / Team Name"><br><br>
    <button id="joinBtn" class="join-btn" onclick="confirmJoin()">JOIN MATCH</button>
</div>

<div class="card">
  <h3>🔐 Room Details</h3>
  <p id="countdown"></p>

  <div id="roomDetails" style="display:none;">
    <p>Room ID: 123456</p>
    <p>Password: 9999</p>
  </div>
</div>

<div class="card">
<h3>📊 Players</h3>
<div id="scoreList"></div>
</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
doc, getDoc, collection, addDoc, getDocs,
runTransaction, increment, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentUser, matchId, matchData;

function getMatchId(){
    return new URLSearchParams(window.location.search).get("id");
}

onAuthStateChanged(auth, async (user)=>{
    if(!user) return location.href="login.html";

    currentUser=user;
    matchId=getMatchId();

    await loadMatch();
    loadScoreboard();
});

async function loadMatch(){

    const snap = await getDoc(doc(db,"matches",matchId));
    matchData = snap.data();

    document.getElementById("mode").innerText = matchData.mode;
    document.getElementById("entry").innerText = matchData.entry;
    document.getElementById("perKill").innerText = matchData.perKill;
    document.getElementById("booyah").innerText = matchData.booyah;
    document.getElementById("time").innerText = matchData.time;
    document.getElementById("rulesText").innerText = matchData.rules || "No rules";

    startTimer(matchData.time);

    const playersRef = collection(db,"matches",matchId,"players");

    onSnapshot(playersRef,(snap)=>{

        const joined = snap.size;
        document.getElementById("slots").innerText =
            `${joined} / ${matchData.totalSlots}`;

        let already = false;

        snap.forEach(d=>{
            if(d.data().userId === currentUser.uid){
                already = true;
            }
        });

        const btn = document.getElementById("joinBtn");

        if(already){
            btn.disabled = true;
            btn.innerText = "Already Joined ✅";
        }

        if(joined >= matchData.totalSlots){
            btn.disabled = true;
            btn.innerText = "Match Full 🔒";
        }

    });
}

window.confirmJoin = async function(){

    const name = document.getElementById("teamInput").value.trim();
    if(!name) return alert("Enter name");

    const loader = document.getElementById("loader");
    loader.style.display="flex";

    let count = 3;

    const interval = setInterval(()=>{
        loader.innerText = "Checking Balance: " + count;
        count--;
    },1000);

    await new Promise(res=>setTimeout(res,3000));
    clearInterval(interval);

    try{

        await runTransaction(db, async (transaction)=>{

            const matchRef = doc(db,"matches",matchId);
            const matchSnap = await transaction.get(matchRef);
            const match = matchSnap.data();

            const userRef = doc(db,"users",currentUser.uid);
            const userSnap = await transaction.get(userRef);
            const user = userSnap.data();

            const playersRef = collection(db,"matches",matchId,"players");
            const snap = await getDocs(playersRef);

            // ❌ already joined
            snap.forEach(d=>{
                if(d.data().userId === currentUser.uid){
                    throw new Error("You already joined this match");
                }
            });

            let slotsNeeded = 1;
            if(match.mode.toLowerCase()==="squad") slotsNeeded=4;
            if(match.mode.toLowerCase()==="duo") slotsNeeded=2;

            if(snap.size + slotsNeeded > match.totalSlots){
                throw new Error("Slots Full ❌");
            }

            if(user.balance < match.entry){
                throw new Error("Low balance - Add money");
            }

            for(let i=0;i<slotsNeeded;i++){
                await addDoc(playersRef,{
                    userId: currentUser.uid,
                    teamName: name,
                    slot: snap.size+i+1,
                    kills:0
                });
            }

            transaction.update(userRef,{
                balance: user.balance - match.entry
            });

            transaction.update(matchRef,{
                joined: increment(slotsNeeded)
            });

        });

        alert("Joined Successfully ✅");

    }catch(err){

        if(err.message.includes("Low balance")){
            if(confirm("Insufficient Balance ❌\nGo to Add Money?")){
                window.location.href="wallet.html";
            }
        }else{
            alert(err.message);
        }
    }

    loader.style.display="none";
};

async function loadScoreboard(){

    const list=document.getElementById("scoreList");
    const snap=await getDocs(collection(db,"matches",matchId,"players"));

    list.innerHTML="";

    snap.forEach(d=>{
        const p=d.data();
        list.innerHTML+=`
        <div class="card">
        Slot ${p.slot} - ${p.teamName}
        </div>`;
    });
}

// ✅ FIXED TIMER (NO NaN)
function startTimer(time){

    const el=document.getElementById("countdown");
    const room=document.getElementById("roomDetails");

    function update(){

        if(!time || !time.includes(":")){
            el.innerText="Invalid time";
            return;
        }

        let [h,m]=time.split(":");

        h = parseInt(h);
        m = parseInt(m);

        if(isNaN(h) || isNaN(m)){
            el.innerText="Invalid time format";
            return;
        }

        const now=new Date();
        const target=new Date();

        target.setHours(h);
        target.setMinutes(m);
        target.setSeconds(0);

        const diff=target-now;

        if(diff<=0){
            el.innerText="Match Live 🔥";
            room.style.display="block";
            return;
        }

        const hh=Math.floor(diff/3600000);
        const mm=Math.floor((diff%3600000)/60000);

        el.innerText=`Starting in ${hh}h ${mm}m`;
    }

    update();
    setInterval(update,1000);
}

</script>

</body>
</html>
