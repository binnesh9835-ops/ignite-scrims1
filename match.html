<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Details</title>

<link rel="stylesheet" href="css/style.css">

<style>
.card {
    background: #111;
    padding: 15px;
    margin: 15px;
    border-radius: 12px;
    color: white;
}

#roomBox {
    border: 1px solid orange;
}

#countdown {
    font-size: 18px;
    color: yellow;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🎮 Match Details</h2>

<!-- 🎮 MATCH INFO -->
<div class="card">
  <h2 id="mode"></h2>

  <p>💰 Entry: ₹<span id="entry"></span></p>
  <p>🎯 Per Kill: ₹<span id="perKill"></span></p>
  <p>🏆 Booyah: ₹<span id="booyah"></span></p>
  <p>🕒 Time: <span id="time"></span></p>
</div>

<!-- 📜 RULES -->
<div class="card">
  <h3>📜 Rules</h3>
  <p id="rulesText">No rules</p>
</div>

<!-- 🔐 ROOM BOX -->
<div class="card" id="roomBox">

  <h3>🔐 Room Details</h3>

  <p id="countdown">Loading...</p>

  <div id="roomDetails" style="display:none;">
    <p>Room ID: 123456</p>
    <p>Password: 9999</p>
  </div>

</div>

<!-- 🔙 BACK -->
<div style="text-align:center;">
  <button onclick="goBack()">⬅ Back</button>
</div>

<script type="module">

import { db } from "./js/firebase.js";

import {
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔍 GET MATCH ID FROM URL
function getMatchId(){
    const url = new URL(window.location.href);
    return url.searchParams.get("id");
}


// 🎮 LOAD MATCH DATA
async function loadMatch(){

    const id = getMatchId();

    const ref = doc(db, "matches", id);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        alert("Match not found");
        return;
    }

    const m = snap.data();

    // 🎮 DATA SHOW
    document.getElementById("mode").innerText = m.mode + " Match";
    document.getElementById("entry").innerText = m.entry;
    document.getElementById("perKill").innerText = m.perKill;
    document.getElementById("booyah").innerText = m.booyah;
    document.getElementById("time").innerText = m.time;

    // 📜 RULES
    document.getElementById("rulesText").innerText = m.rules || "No rules";

    // ⏳ START TIMER
    startTimer(m.time);
}


// ⏳ TIMER SYSTEM
function startTimer(matchTime){

    const countdown = document.getElementById("countdown");
    const roomDetails = document.getElementById("roomDetails");

    function update(){

        const now = new Date();

        // ⚠️ TIME FORMAT: 21:00 (24h)
        const target = new Date();
        const parts = matchTime.split(":");

        if(parts.length < 2){
            countdown.innerText = "Invalid time format";
            return;
        }

        const hour = parseInt(parts[0]);
        const minute = parseInt(parts[1]);

        target.setHours(hour);
        target.setMinutes(minute);
        target.setSeconds(0);

        const diff = target - now;

        if(diff <= 0){
            countdown.innerText = "Match Live 🔥";
            roomDetails.style.display = "block";
            return;
        }

        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        countdown.innerText = `Starting in ${h}h ${m}m`;
    }

    update();
    setInterval(update, 1000); // 🔥 auto update
}


// 🔙 BACK
window.goBack = function(){
    window.location.href = "dashboard.html";
};


// 🚀 INIT
loadMatch();

</script>

</body>
</html>
