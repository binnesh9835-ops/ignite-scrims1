<!DOCTYPE html>
<html>

<head>
<title>IGNITE SCRIMS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<h1>IGNITE SCRIMS</h1>

<p>Play Fair • Win Big</p>

<button class="login-btn" id="loginBtn">Login / Register</button>

<div class="scroll-down">⬇</div>

</header>


<section class="matches">

<h2>Upcoming Matches</h2>

<div class="match">

<h3>Duo Match</h3>

<p>Entry: ₹20</p>

<p>Players: 12 / 48</p>

<button id="joinBtn">Join Match</button>

</div>

</section>


<!-- FIREBASE LOGIN SCRIPT -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims",
  storageBucket: "ignite-scrims.firebasestorage.app",
  messagingSenderId: "497561769270",
  appId: "1:497561769270:web:ef4f215a253e984f2dcf97"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();


// LOGIN BUTTON

document.getElementById("loginBtn").addEventListener("click", () => {

signInWithPopup(auth, provider)

.then((result) => {

const user = result.user;

alert("Welcome " + user.displayName);

})

.catch((error) => {

console.log(error);

});

});


// JOIN MATCH BUTTON

document.getElementById("joinBtn").addEventListener("click", () => {

if(auth.currentUser){

alert("Match joining system coming soon");

}

else{

alert("Please login first");

}

});

</script>
