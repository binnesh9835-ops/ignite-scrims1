<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f1a;color:#fff;}
.container{max-width:420px;margin:auto;}

.header{display:flex;justify-content:center;align-items:center;gap:10px;padding:14px;background:#020617;}
.brand{
  font-size:18px;font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{0%{background-position:0%}100%{background-position:300%}}

.line{height:2px;width:60px;background:linear-gradient(90deg,transparent,#22c55e,transparent);}

.menu{display:flex;gap:8px;padding:10px;align-items:center;overflow-x:auto;}
.tab{padding:10px;border:none;background:#1e293b;color:white;border-radius:8px;cursor:pointer;}
.tab.active{background:#22c55e;}

.auth-btn{margin-left:auto;padding:8px 12px;border:none;border-radius:6px;background:#22c55e;color:white;cursor:pointer;}

.section{display:none;padding:15px;}
.section.active{display:block;}

.card{background:#111827;padding:15px;border-radius:12px;}
.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#22c55e;color:white;}
.input{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;}
.popup-box{background:#111827;padding:20px;border-radius:12px;width:90%;}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button class="auth-btn" id="authBtn">Login</button>
</div>

<div id="home" class="section active">
  <div class="card"><h2>🔥 Welcome Gamer</h2></div>
</div>

<div id="matches" class="section">
  <div class="card"><h3>🎮 Matches</h3></div>
</div>

<div id="wallet" class="section">
  <div class="card"><h3>💰 Wallet</h3></div>
</div>

<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="profileData">Login karo</div>
  </div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Complete Profile</h3>

    <p style="color:red;font-size:12px;">
      These details can only be updated after 14 days
    </p>

    <input class="input" id="name" placeholder="Full Name">
    <input class="input" id="phone" placeholder="+91 Phone Number">
    <input class="input" id="email" readonly>

    <input class="input" id="ign" placeholder="IGN">
    <input class="input" id="uid" placeholder="UID">
    <input class="input" id="matchesInput" placeholder="Matches">
    <input class="input" id="killsInput" placeholder="Kills">

    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims"
});

var auth = firebase.auth();
var db = firebase.firestore();

/* TABS FIX */
document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

                       document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

/* LOGIN */
document.getElementById("authBtn").addEventListener("click", function(){

  var btn = this;

  if(btn.innerText === "Logout"){
    location.reload();
    return;
  }

  var provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(async function(result){

    var email = result.user.email;

    var docSnap = await db.collection("users").doc(email).get();

    if(docSnap.exists){
      var data = docSnap.data();
      updateProfile(data);
      btn.innerText = "Logout";
      alert("Welcome back " + data.name);
    } else {
      document.getElementById("email").value = email;
      document.getElementById("detailsPopup").style.display = "flex";
    }

  });

});

/* SAVE */
function saveDetails(){

  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;
  var email = document.getElementById("email").value;
  var ign = document.getElementById("ign").value;
  var uid = document.getElementById("uid").value;
  var matches = document.getElementById("matchesInput").value;
  var kills = document.getElementById("killsInput").value;

  if(!name  !phone  !ign || !uid){
    alert("Fill all fields");
    return;
  }

  var data = {
    name:name,
    phone:phone,
    email:email,
    ign:ign,
    uid:uid,
    matches:matches,
    kills:kills,
    lastUpdated:Date.now()
  };

  db.collection("users").doc(email).set(data);

  updateProfile(data);

  document.getElementById("authBtn").innerText="Logout";
  document.getElementById("detailsPopup").style.display="none";
}

/* PROFILE */
function updateProfile(d){
  document.getElementById("profileData").innerHTML = 
    <p>${d.name}</p>
    <p>${d.phone}</p>
    <p>${d.email}</p>
    <hr>
    <p>IGN: ${d.ign}</p>
    <p>UID: ${d.uid}</p>
    <p>Matches: ${d.matches}</p>
    <p>Kills: ${d.kills}</p>
    <button class="btn" onclick="editProfile()">Edit Profile</button>
  ;
}

/* EDIT */
function editProfile(){

  var user = auth.currentUser;
  if(!user) return;

  db.collection("users").doc(user.email).get().then(function(doc){

    var d = doc.data();
    var days = (Date.now()-d.lastUpdated)/(1000*60*60*24);

    if(days < 14){
      alert("Update after 14 days");
      return;
    }

    document.getElementById("name").value = d.name;
    document.getElementById("phone").value = d.phone;
    document.getElementById("email").value = d.email;
    document.getElementById("ign").value = d.ign;
    document.getElementById("uid").value = d.uid;
    document.getElementById("matchesInput").value = d.matches;
    document.getElementById("killsInput").value = d.kills;

    document.getElementById("detailsPopup").style.display="flex";
  });
}

</script>

</body>
</html>
