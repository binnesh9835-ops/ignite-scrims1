<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="container">

<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button id="authBtn" class="tab">Login</button>
</div>

<div id="home" class="section active">
  <div class="card"><h2>🔥 Welcome Gamer</h2></div>
</div>

<div id="matches" class="section">
  <div class="card"><h3>🎮 Matches</h3></div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">

    <h2 id="balance">₹0</h2>

    <!-- ✅ function names match JS -->
    <button class="btn" onclick="openAddMoney()">Add Money</button>
    <button class="btn" onclick="openWithdraw()">Withdraw</button>

    <hr style="margin:15px 0;">

    <!-- ✅ this was missing earlier -->
    <div id="history">
      <p>No transactions yet</p>
    </div>

  </div>
</div>

<!-- ADD MONEY POPUP -->
<div class="popup" id="addMoneyPopup">
  <div class="popup-box">
    <h3>Add Money</h3>

    <input class="input" id="amountInput" placeholder="Enter Amount">

    <!-- FIX: function name must match app.js -->
    <button class="btn" onclick="confirmAmount()">Confirm</button>
  </div>
</div>

<!-- PAYMENT POPUP -->
<div class="popup" id="paymentPopup">
  <div class="popup-box">
    <h3>Complete Payment</h3>

    <p>Send money to UPI:</p>
    <h4>9279072936@axl</h4>

    <p id="payAmount"></p>

    <input class="input" id="payerName" placeholder="Your Name">
    <input class="input" id="txnId" placeholder="Transaction ID">

    <!-- FIX: match app.js -->
    <button class="btn" onclick="submitPayment()">Submit</button>
  </div>
</div>

<!-- WITHDRAW POPUP -->
<div class="popup" id="withdrawPopup">
  <div class="popup-box">
    <h3>Withdraw</h3>

    <!-- WITHDRAW POPUP -->
<div class="popup" id="withdrawPopup">
  <div class="popup-box">
    <h3>Withdraw</h3>

    <input class="input" id="withdrawAmount" placeholder="Enter Amount">
    <input class="input" id="withdrawUpi" placeholder="Enter UPI ID">

    <p id="withdrawMsg"></p>

    <button class="btn" onclick="submitWithdraw()">Confirm</button>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="popup" id="successPopup">
  <div class="popup-box">
    <h3 style="color:limegreen;">✅ Withdrawal Requested</h3>

    <p style="color:lightgreen;">
      Your request has been submitted.<br>
      Amount will be sent to your UPI shortly.
    </p>

    <button class="btn" onclick="closePopup('successPopup')">Back</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="profileText">Login karo</div>
  </div>
</div>

</div>

<!-- DETAILS POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Complete Profile</h3>

    <input class="input" id="name" placeholder="Full Name">
    <input class="input" id="phone" placeholder="+91 Phone Number">
    <input class="input" id="email" readonly>

    <input class="input" id="ign" placeholder="IGN">
    <input class="input" id="uid" placeholder="UID">

    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
