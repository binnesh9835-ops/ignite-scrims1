<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f1a;color:#fff;}
.container{max-width:420px;margin:auto;}

.header{
  display:flex;justify-content:center;align-items:center;
  gap:10px;padding:14px;background:#020617;
}
.brand{
  font-size:18px;font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{0%{background-position:0%}100%{background-position:300%}}

.line{
  height:2px;width:60px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  animation:glow 2s infinite;
}
@keyframes glow{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

.menu{
  display:flex;gap:8px;padding:10px;
  align-items:center;overflow-x:auto;
}

.tab{
  padding:10px;border:none;
  background:#1e293b;color:white;
  border-radius:8px;cursor:pointer;
}
.tab.active{background:#22c55e;}

.auth-btn{
  margin-left:auto;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.section{display:none;padding:15px;}
.section.active{display:block;}

.card{
  background:#111827;padding:15px;border-radius:12px;
  box-shadow:0 0 12px rgba(34,197,94,0.3);
}

.btn{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:8px;
  background:#22c55e;color:white;
}

.input{
  width:100%;padding:10px;margin-top:10px;
  border:none;border-radius:6px;
}

.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.popup-box{
  background:#111827;padding:20px;border-radius:12px;width:90%;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button class="auth-btn" id="authBtn">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🔥 Welcome Gamer</h2>
    <p style="margin-top:10px;">Join matches & win rewards</p>
  </div>
</div>

<!-- MATCHES -->
<div id="matches" class="section">
  <div class="card">
    <h3>🎮 Available Matches</h3>
    <button class="btn">Join Match (₹10)</button>
    <button class="btn">Join Match (₹20)</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">
    <h3>💰 Wallet</h3>
    <p style="margin-top:10px;">Balance: ₹100</p>
    <button class="btn">Add Money</button>
    <button class="btn">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="profileData">Login karo</div>
  </div>
</div>

</div>

<!-- DETAILS POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Complete Profile</h3>
    <input class="input" id="name" placeholder="Full Name">
    <input class="input" id="phone" placeholder="+91 Phone Number">
    <input class="input" id="email" readonly>
    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

  /* 🔥 YOUR CONFIG */
firebase.initializeApp({
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims",
  storageBucket: "ignite-scrims.firebasestorage.app",
  messagingSenderId: "497561769270",
  appId: "1:497561769270:web:ef4f215a253e984f2dcf97"
});

var auth = firebase.auth();
var db = firebase.firestore();

/* TAB FIX */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  }
});

/* LOGIN */
document.getElementById("authBtn").onclick = function(){

  if(this.innerText === "Logout"){
    location.reload();
    return;
  }

  var provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result=>{

    var user = result.user;
    document.getElementById("email").value = user.email;
    document.getElementById("detailsPopup").style.display="flex";

  }).catch(()=>{
    alert("Login Failed");
  });
};

/* SAVE */
function saveDetails(){

  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;
  var email = document.getElementById("email").value;

  if(!name || !phone){
    alert("Fill all fields");
    return;
  }

  db.collection("users").doc(email).set({
    name:name,
    phone:phone,
    email:email
  });

  document.getElementById("profileData").innerHTML =
    "<p>Name: "+name+"</p><p>Phone: "+phone+"</p><p>Email: "+email+"</p>";

  document.getElementById("authBtn").innerText="Logout";
  document.getElementById("detailsPopup").style.display="none";
}

</script>

</body>
</html>
