<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGNITE SCRIMS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1 class="logo">IGNITE SCRIMS</h1>

    <div class="profile-btn" id="profileBtn">
        Login
    </div>
</header>


<!-- MATCH FEED -->
<section class="matches-section">

    <h2 class="section-title">Upcoming Matches</h2>

    <div id="matchesContainer">

        <!-- Example Match Card -->
        <div class="match-card">

            <img src="https://via.placeholder.com/120" class="match-thumb">

            <div class="match-info">
                <h3>DUO SCRIMS</h3>
                <p>Entry ₹20</p>
                <p>Slots 12/48</p>
                <p>Time 8:30 PM</p>
            </div>

        </div>

        <button class="join-btn">JOIN MATCH</button>

    </div>

</section>



<!-- TOP PLAYERS -->
<section class="leaderboard">

    <h2 class="section-title">🔥 Top Players</h2>

    <div id="topPlayers">

        <div class="player">#1 Aman</div>
        <div class="player">#2 Rahul</div>
        <div class="player">#3 Arjun</div>

    </div>

</section>



<!-- PROFILE POPUP -->
<div class="profile-modal" id="profileModal">

    <div class="profile-content">

        <span class="close-btn" id="closeProfile">X</span>

        <h2>User Profile</h2>

        <p>Username: Player</p>
        <p>XP: 0</p>
        <p>Matches Played: 0</p>

        <hr>

        <h3>Game Info</h3>

        <p>IGN: -</p>
        <p>Game UID: -</p>
        <p>Level: -</p>
        <p>Bio: -</p>

    </div>

</div>



<!-- ADMIN PANEL PLACEHOLDER -->
<div id="adminPanel" style="display:none">

<h2>Admin Panel</h2>

<button>Add Match</button>
<button>Approve Payments</button>

</div>



<!-- SUPPORT BUTTON -->
<div class="support-btn" id="supportBtn">

    💬

</div>



<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="matches.js"></script>
<script src="profile.js"></script>
<script src="admin.js"></script>
<script src="xp.js"></script>
<script src="support.js"></script>

</body>
</html>
