<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IGNITE SCRIMS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0c0c0c;
color:white;
text-align:center;
}

/* TOP MENU */

.topmenu{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#111;
font-weight:bold;
}

.topmenu span{
cursor:pointer;
}

/* LOGIN BUTTON */

.login-btn{
position:absolute;
top:15px;
right:20px;
background:orange;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* TITLE */

.title{
font-size:40px;
margin-top:40px;
font-weight:bold;
background:linear-gradient(90deg,#ffcc00,#ffffff,#ffcc00);
-webkit-background-clip:text;
color:transparent;
}

/* UPCOMING MATCHES */

.upcoming{
margin-top:60px;
font-size:24px;
position:relative;
display:inline-block;
}

.upcoming::before,
.upcoming::after{
content:"";
position:absolute;
width:120px;
height:2px;
top:50%;
background:linear-gradient(to right,transparent,orange);
animation:shine 2s infinite;
}

.upcoming::before{
right:110%;
}

.upcoming::after{
left:110%;
transform:scaleX(-1);
}

@keyframes shine{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* MATCH AREA */

#matchesContainer{
margin-top:30px;
}

/* LOGIN POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
}

.popup-box{
background:#1a1a1a;
padding:30px;
border-radius:10px;
}

.popup-box button{
margin-top:10px;
padding:10px;
cursor:pointer;
}

/* TELEGRAM BUTTON */

.support{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
border-radius:50%;
background:#1da1f2;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
}

</style>

</head>


<body>


<!-- TOP MENU -->

<div class="topmenu">

<span>Home Feed</span>
<span>My Matches</span>
<span>Wallet</span>
<span>Profile</span>

</div>


<!-- LOGIN BUTTON -->

<button class="login-btn" id="loginBtn">
Login
</button>



<!-- TITLE -->

<div class="title">
IGNITE SCRIMS
</div>



<!-- UPCOMING -->

<div class="upcoming">
Upcoming Matches
</div>



<div id="matchesContainer">
</div>



<!-- LOGIN POPUP -->

<div class="popup" id="loginPopup">

<div class="popup-box">

<h3>Login to Join Matches</h3>

<button id="googleLogin">
Login with Google
</button>

<br>

<button onclick="closeLogin()">
Back
</button>

</div>

</div>



<!-- TELEGRAM SUPPORT -->

<div class="support" onclick="openSupport()">
💬
</div>



<script>

/* LOGIN POPUP */

const loginBtn=document.getElementById("loginBtn");
const loginPopup=document.getElementById("loginPopup");

loginBtn.onclick=()=>{
loginPopup.style.display="flex";
}

function closeLogin(){
loginPopup.style.display="none";
}


/* TELEGRAM SUPPORT */

function openSupport(){

window.open(
"https://t.me/IgniteScrimsFF_Support",
"_blank"
);

}

</script>


</body>
</html>
