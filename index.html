<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b0f1a;
  color:#fff;
}

/* 🔥 RESPONSIVE CONTAINER */
.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:10px;
}

/* 🔥 HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:15px;
}

/* 🔥 SHINE TEXT */
.brand{
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 5s linear infinite;
}

/* ✨ SHINE ANIMATION */
@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:400%;}
}

/* 🔥 SIDE LINES */
.line{
  height:2px;
  width:70px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  animation:lineMove 2s infinite;
}

@keyframes lineMove{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* 🔥 MENU */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

/* 🔥 TABS */
.tab{
  padding:10px 14px;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;
  transition:0.3s;
}

.tab:hover{
  background:#334155;
}

.tab.active{
  background:#22c55e;
}

/* 🔥 SECTIONS */
.section{
  display:none;
  padding:15px;
}

.section.active{
  display:block;
}

/* 🔥 CARD */
.card{
  background:#111827;
  padding:18px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* 📱 MOBILE OPTIMIZATION */
@media(max-width:600px){

  .brand{
    font-size:18px;
  }

  .line{
    width:40px;
  }

}

/* 💻 DESKTOP OPTIMIZATION */
@media(min-width:768px){

  .menu{
    justify-content:center;
  }

  .card{
    max-width:600px;
    margin:auto;
  }

}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
</div>

<!-- SECTIONS -->
<div id="home" class="section active">
  <div class="card">
    <h2>🔥 Welcome Gamer</h2>
    <p>Best scrims platform loading...</p>
  </div>
</div>

<div id="matches" class="section">
  <div class="card">
    <h3>🎮 Matches</h3>
    <p>Upcoming matches will appear here</p>
  </div>
</div>

<div id="wallet" class="section">
  <div class="card">
    <h3>💰 Wallet</h3>
    <p>Your balance & transactions</p>
  </div>
</div>

<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <p>User profile info</p>
  </div>
</div>

</div>

<!-- JS -->
<script>

/* 🔥 TAB SWITCH */
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

tabs.forEach(btn=>{
  btn.onclick = () => {
    tabs.forEach(t=>t.classList.remove("active"));
    sections.forEach(s=>s.classList.remove("active"));

    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  };
});

</script>

</body>
</html>
