<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
  position:sticky;
  top:0;
}

.tab{
  padding:10px 15px;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* SECTIONS */
.section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

/* BUTTON */
.btn{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <button class="tab" data-tab="home">Home</button>
  <button class="tab" data-tab="profile">Profile</button>

  <button class="tab" id="adminTab" data-tab="admin" style="display:none;">
    Admin Panel
  </button>

  <button class="tab" id="ownerTab" data-tab="owner" style="display:none;">
    Owner Panel
  </button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🎮 Welcome Gamer</h2>
    <p>Yaha se tu apna scrims system build karega 🔥</p>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>Profile</h3>
    <p>Name: Vishal</p>
    <p>Coins: 100</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="section">
  <div class="card">
    <h3>Admin Panel</h3>

    <button class="btn">Approve Add Money</button>
    <button class="btn">Approve Withdraw</button>
    <button class="btn">Create Match</button>
    <button class="btn">View Users</button>

  </div>
</div>

<!-- OWNER PANEL -->
<div id="owner" class="section">
  <div class="card">
    <h3>Owner Panel</h3>

    <button class="btn">Full Control</button>
    <button class="btn">Manage Admins</button>
    <button class="btn">All Transactions</button>

  </div>
</div>

<script>

/* TAB SWITCH */
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    const target = tab.getAttribute("data-tab");

    sections.forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  });
});

/* ROLE SYSTEM */
function updateRoleUI(){

  const role = localStorage.getItem("userRole");

  const adminTab = document.getElementById("adminTab");
  const ownerTab = document.getElementById("ownerTab");

  if(role === "admin"){
    adminTab.style.display="inline-block";
  }

  if(role === "owner"){
    adminTab.style.display="inline-block";
    ownerTab.style.display="inline-block";
  }
}

// CALL
updateRoleUI();

</script>

</body>
</html>
