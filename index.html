<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b0f1a;
  color:#fff;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
}

/* 🔥 NEW HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  background:#020617;
}

/* RGB TEXT */
.brand{
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
  letter-spacing:1px;
}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* SIDE LINES */
.line{
  height:2px;
  width:60px;
  background:linear-gradient(90deg, transparent, #22c55e, transparent);
  animation:glow 2s linear infinite;
}

@keyframes glow{
  0%{opacity:0.3; transform:scaleX(0.8);}
  50%{opacity:1; transform:scaleX(1.2);}
  100%{opacity:0.3; transform:scaleX(0.8);}
}

/* MENU */
.menu{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
}

.tab{
  flex-shrink:0;
  padding:10px 14px;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  font-size:14px;
}

.tab.active{
  background:#22c55e;
}

/* SECTION */
.section{
  display:none;
  padding:15px;
}

.section.active{
  display:block;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(34,197,94,0.3);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* DESKTOP */
@media(min-width:768px){
  body{
    display:flex;
    justify-content:center;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🔥 Welcome Gamer</h2>
    <p style="margin-top:10px;">Join matches & win rewards</p>
  </div>
</div>

<!-- MATCHES -->
<div id="matches" class="section">
  <div class="card">
    <h3>🎮 Available Matches</h3>
    <button class="btn">Join Match (₹10)</button>
    <button class="btn">Join Match (₹20)</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">
    <h3>💰 Wallet</h3>
    <p style="margin-top:10px;">Balance: ₹100</p>
    <button class="btn">Add Money</button>
    <button class="btn">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <p style="margin-top:10px;">Name: Vishal</p>
    <p>UID: 12345</p>
  </div>
</div>

</div>

<script>

/* TAB SWITCH */
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{

    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const target = tab.getAttribute("data-tab");

    sections.forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  });
});

</script>

</body>
</html>
