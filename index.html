<!DOCTYPE html><html><head>
<title>IGNITE SCRIMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head><body><header class="hero"><h1>IGNITE SCRIMS</h1>
<p>Play Fair • Win Big</p><button class="login-btn" id="loginBtn">Login / Register</button>

<div class="scroll-down">⬇️</div></header><section class="matches"><h2>Upcoming Matches</h2><div class="match"><h3>Duo Match</h3>
<p>Entry: ₹20</p>
<p>Players: 12 / 48</p><button id="joinBtn">Join Match</button>

</div></section><!-- USERNAME POPUP --><div id="usernamePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;"><div style="background:#1e1e1e; padding:25px; border-radius:10px; text-align:center; width:80%; max-width:320px;"><h3 style="color:white;">Choose Your IGN</h3><input id="usernameInput" type="text" placeholder="Enter Username" style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:6px;"><button id="saveUsernameBtn" style="margin-top:15px; padding:10px 20px; background:#ff3c3c; border:none; color:white; border-radius:6px; cursor:pointer;">
Submit
</button></div>
</div><!-- FIREBASE SCRIPT --><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
authDomain: "ignite-scrims.firebaseapp.com",
projectId: "ignite-scrims",
storageBucket: "ignite-scrims.firebasestorage.app",
messagingSenderId: "497561769270",
appId: "1:497561769270:web:ef4f215a253e984f2dcf97"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);


// LOGIN BUTTON

document.getElementById("loginBtn").addEventListener("click", () => {

signInWithPopup(auth, provider)

.then(async (result) => {

const user = result.user;

alert("Welcome " + user.displayName);

// check user in database

const userRef = doc(db, "users", user.uid);
const docSnap = await getDoc(userRef);

if(!docSnap.exists()){

document.getElementById("usernamePopup").style.display = "flex";

}

})

.catch((error) => {

console.log(error);

});

});


// SAVE USERNAME

document.getElementById("saveUsernameBtn").addEventListener("click", async () => {

const username = document.getElementById("usernameInput").value.toLowerCase();

if(username.includes(" ")){

alert("No spaces allowed in username");
return;

}

const usernameRef = doc(db, "usernames", username);
const usernameSnap = await getDoc(usernameRef);

if(usernameSnap.exists()){

alert("Username already taken");
return;

}

const user = auth.currentUser;

// save username lock
await setDoc(usernameRef,{
uid: user.uid
});

// save user profile
await setDoc(doc(db,"users",user.uid),{

username: username,
email: user.email,
coins: 0,
matchesPlayed: 0

});

alert("Username saved successfully");

document.getElementById("usernamePopup").style.display="none";

});


// JOIN MATCH BUTTON

document.getElementById("joinBtn").addEventListener("click", () => {

if(auth.currentUser){

alert("Match joining system coming soon");

}
else{

alert("Please login first");

}

});

</script></body>
</html>
