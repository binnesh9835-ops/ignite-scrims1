<!DOCTYPE html>
<html>
<head>
<title>IGNITE SCRIMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1>IGNITE SCRIMS</h1>
  <p>Play Fair • Win Big</p>
  <button class="login-btn" id="loginBtn">Login / Register</button>
  <div class="scroll-down">⬇️</div>
</header>

<section class="matches">
  <h2>Upcoming Matches</h2>
  <div class="match">
    <h3>Duo Match</h3>
    <p>Entry: ₹20</p>
    <p>Players: 12 / 48</p>
    <button id="joinBtn">Join Match</button>
  </div>
</section>

<!-- USERNAME POPUP -->
<div id="usernamePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
  <div style="background:#1e1e1e; padding:25px; border-radius:10px; text-align:center; width:80%; max-width:320px;">
    <h3 style="color:white;">Choose Your Username</h3>
    <input id="usernameInput" type="text" placeholder="Enter Username" style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:6px;">
    <button id="saveUsernameBtn" style="margin-top:15px; padding:10px 20px; background:#ff3c3c; border:none; color:white; border-radius:6px;">Submit</button>
  </div>
</div>

<!-- RULES POPUP -->
<div id="rulesPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center;">
  <div style="background:#1e1e1e; padding:25px; border-radius:10px; text-align:center; width:85%; max-width:350px; color:white;">
    <h3>IGNITE SCRIMS RULES</h3>
    <p style="text-align:left; font-size:14px; margin-top:10px;">
      • No hacking<br>
      • No teaming<br>
      • Entry fee non-refundable<br>
      • Join room 10 minutes before match
    </p>
    <button id="rulesNextBtn" style="margin-top:15px; padding:10px 20px; background:#ff3c3c; border:none; color:white; border-radius:6px;">Next</button>
  </div>
</div>

<!-- IGN POPUP -->
<div id="ignPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center;">
  <div style="background:#1e1e1e; padding:25px; border-radius:10px; text-align:center; width:85%; max-width:350px; color:white;">
    <h3>Enter Free Fire IGN</h3>
    <input id="ignInput" type="text" placeholder="Your In Game Name" style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:6px;">
    <button id="saveIgnBtn" style="margin-top:15px; padding:10px 20px; background:#ff3c3c; border:none; color:white; border-radius:6px;">Next</button>
  </div>
</div>

<!-- PAYMENT POPUP -->
<div id="paymentPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;">
  <div style="background:#1e1e1e; padding:25px; border-radius:10px; text-align:center; width:85%; max-width:350px; color:white;">
    <h3>Pay Entry Fee</h3>
    <p>Send ₹20 to UPI</p>
    <p style="font-size:18px; color:#00ff90;">9279072936@axl</p>
    <input id="refInput" type="text" placeholder="Enter UPI Reference Number" style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:6px;">
    <button id="submitPaymentBtn" style="margin-top:15px; padding:10px 20px; background:#ff3c3c; border:none; color:white; border-radius:6px;">Submit</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const firebaseConfig = {
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims",
  storageBucket: "ignite-scrims.firebasestorage.app",
  messagingSenderId: "497561769270",
  appId: "1:497561769270:web:ef4f215a253e984f2dcf97"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    alert("Welcome " + user.displayName);
    const userRef = doc(db,"users",user.uid);
    const snap = await getDoc(userRef);
    if(!snap.exists()){
      document.getElementById("usernamePopup").style.display="flex";
    }
  } catch(e) {
    alert("Login failed");
  }
};

// SAVE USERNAME
document.getElementById("saveUsernameBtn").onclick = async () => {
  const username = document.getElementById("usernameInput").value.trim().toLowerCase();
  if(username.includes(" ")){ alert("No spaces allowed"); return; }
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }
  await setDoc(doc(db,"users",user.uid), {
    username: username,
    email: user.email,
    coins: 0,
    matchesPlayed: 0
  });
  alert("Username saved");
  document.getElementById("usernamePopup").style.display="none";
};

// JOIN MATCH
document.getElementById("joinBtn").onclick = () => {
  if(!auth.currentUser){ alert("Login first"); return; }
  document.getElementById("rulesPopup").style.display="flex";
};

// RULES NEXT
document.getElementById("rulesNextBtn").onclick = () => {
  document.getElementById("rulesPopup").style.display="none";
  document.getElementById("ignPopup").style.display="flex";
};

// SAVE IGN
document.getElementById("saveIgnBtn").onclick = () => {
  const ign = document.getElementById("ignInput").value.trim();
  if(ign==""){ alert("Enter IGN"); return; }
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }
  setDoc(doc(db,"users",user.uid), { ign: ign }, { merge:true });
  document.getElementById("ignPopup").style.display="none";
  document.getElementById("paymentPopup").style.display="flex";
};

// SUBMIT PAYMENT
document.getElementById("submitPaymentBtn").onclick = async () => {
  const ref = document.getElementById("refInput").value.trim();
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }
  if(ref==""){ alert("Enter reference number"); return; }
  try {
    await setDoc(doc(db,"payments",ref), {
      uid: user.uid,
      email: user.email,
      ign: (await getDoc(doc(db,"users",user.uid))).data().ign || "",
      reference: ref,
      status: "pending"
    });
    alert("Payment submitted");
    document.getElementById("paymentPopup").style.display="none";
  } catch(e) {
    alert("Error submitting payment");
  }
};
</script>

</body>
</html>
