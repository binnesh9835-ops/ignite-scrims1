<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f1a;color:#fff;}

/* CONTAINER */
.container{max-width:420px;margin:auto;position:relative;}

/* LOGIN BUTTON */
.login-btn{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  font-size:12px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  background:#020617;
}

.brand{
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:300%}
}

.line{
  height:2px;width:60px;
  background:linear-gradient(90deg, transparent, #22c55e, transparent);
  animation:glow 2s infinite;
}

@keyframes glow{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

/* MENU */
.menu{display:flex;overflow-x:auto;gap:8px;padding:10px;}
.tab{padding:10px 14px;border:none;background:#1e293b;color:white;border-radius:8px;}
.tab.active{background:#22c55e;}

/* SECTION */
.section{display:none;padding:15px;}
.section.active{display:block;}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(34,197,94,0.3);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:350px;
}

.input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* DESKTOP */
@media(min-width:768px){
  body{display:flex;justify-content:center;}
}
</style>
</head>

<body>

<div class="container">

<button class="login-btn" onclick="openLogin()">Login</button>

<!-- HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🔥 Welcome Gamer</h2>
    <p style="margin-top:10px;">Join matches & win rewards</p>
  </div>
</div>

<!-- MATCHES -->
<div id="matches" class="section">
  <div class="card">
    <h3>🎮 Available Matches</h3>
    <button class="btn">Join Match (₹10)</button>
    <button class="btn">Join Match (₹20)</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">
    <h3>💰 Wallet</h3>
    <p style="margin-top:10px;">Balance: ₹100</p>
    <button class="btn">Add Money</button>
    <button class="btn">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <p style="margin-top:10px;">Name: Vishal</p>
    <p>UID: 12345</p>
  </div>
</div>

</div>

<!-- LOGIN POPUP -->
<div class="popup" id="loginPopup">
  <div class="popup-box">
    <h3>Login</h3>
    <button class="btn" onclick="googleLogin()">Login with Google</button>
    <button class="btn" onclick="closePopup()">Back</button>
  </div>
</div>

<!-- DETAILS POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Enter Details</h3>
    <input class="input" id="name" placeholder="Your Full Name">
    <input class="input" id="phone" placeholder="Phone Number">
    <input class="input" id="email" placeholder="Email Address">
    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<script>

/* TAB SWITCH */
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const target = tab.getAttribute("data-tab");
    sections.forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  });
});

/* LOGIN FLOW */
function openLogin(){
  document.getElementById("loginPopup").style.display="flex";
}

function closePopup(){
  document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
}

/* GOOGLE LOGIN (Firebase later) */
function googleLogin(){
  closePopup();
  document.getElementById("detailsPopup").style.display="flex";
}

/* SAVE DETAILS */
function saveDetails(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  const user = {name, phone, email};

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push(user);

  localStorage.setItem("users", JSON.stringify(users));

  alert("Details Saved ✅");
  closePopup();
}

</script>

</body>
</html>
