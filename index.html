<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f1a;color:#fff;}
.container{max-width:420px;margin:auto;}

.header{
  display:flex;justify-content:center;align-items:center;
  gap:10px;padding:14px;background:#020617;
}
.brand{
  font-size:18px;font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{0%{background-position:0%}100%{background-position:300%}}

.line{
  height:2px;width:60px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  animation:glow 2s infinite;
}
@keyframes glow{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

.menu{
  display:flex;gap:8px;padding:10px;
  align-items:center;overflow-x:auto;
}

.tab{
  padding:10px;border:none;
  background:#1e293b;color:white;
  border-radius:8px;cursor:pointer;
}
.tab.active{background:#22c55e;}

.auth-btn{
  margin-left:auto;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.section{display:none;padding:15px;}
.section.active{display:block;}

.card{
  background:#111827;padding:15px;border-radius:12px;
  box-shadow:0 0 12px rgba(34,197,94,0.3);
}

.btn{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:8px;
  background:#22c55e;color:white;
}

.input{
  width:100%;padding:10px;margin-top:10px;
  border:none;border-radius:6px;
}

.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.popup-box{
  background:#111827;padding:20px;border-radius:12px;width:90%;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button class="auth-btn" id="authBtn">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🔥 Welcome Gamer</h2>
  </div>
</div>

<!-- MATCHES -->
<div id="matches" class="section">
  <div class="card">
    <h3>🎮 Matches</h3>
    <button class="btn">Join Match</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
  <div class="card">
    <h3>💰 Wallet</h3>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="profileData">Login karo</div>
  </div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Complete Profile</h3>

    <p style="color:red;font-size:12px;">
      These details can only be updated after 14 days, so fill carefully
    </p>

    <input class="input" id="name" placeholder="Full Name">
    <input class="input" id="phone" placeholder="+91 Phone Number">
    <input class="input" id="email" readonly>

    <input class="input" id="ign" placeholder="In Game Name">
    <input class="input" id="uid" placeholder="Game UID">
    <input class="input" id="matches" placeholder="Total Matches Played">
    <input class="input" id="kills" placeholder="Total Kills">

    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
firebase.initializeApp({
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims"
});

var auth = firebase.auth();
var db = firebase.firestore();

/* TAB */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  }
});

/* LOGIN */
document.getElementById("authBtn").onclick = function(){

  if(this.innerText === "Logout"){
    location.reload();
    return;
  }

  var provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(async result=>{

    var email = result.user.email;

    var doc = await db.collection("users").doc(email).get();

    if(doc.exists){
      var data = doc.data();
      updateProfileUI(data);
      this.innerText="Logout";
      alert("Welcome back " + data.name);
    } else {
      document.getElementById("email").value=email;
      document.getElementById("detailsPopup").style.display="flex";
    }

  });
};

/* SAVE */
function saveDetails(){

  var data = {
    name:name.value,
    phone:phone.value,
    email:email.value,
    ign:ign.value,
    uid:uid.value,
    matches:matches.value,
    kills:kills.value,
    lastUpdated:Date.now()
  };

  db.collection("users").doc(data.email).set(data);
  updateProfileUI(data);

  authBtn.innerText="Logout";
  detailsPopup.style.display="none";
}

/* PROFILE UI */
function updateProfileUI(d){
  profileData.innerHTML = 
    <p>${d.name}</p>
    <p>${d.phone}</p>
    <p>${d.email}</p>
    <hr>
    <p>IGN: ${d.ign}</p>
    <p>UID: ${d.uid}</p>
    <p>Matches: ${d.matches}</p>
    <p>Kills: ${d.kills}</p>
    <button class="btn" onclick="editProfile()">Edit Profile</button>
  ;
}

/* EDIT */
function editProfile(){

  var email = firebase.auth().currentUser.email;

  db.collection("users").doc(email).get().then(doc=>{

    var d = doc.data();
    var days = (Date.now()-d.lastUpdated)/(1000*60*60*24);

    if(days<14){
      alert("Update after 14 days ❌");
      return;
    }

    name.value=d.name;
    phone.value=d.phone;
    email.value=d.email;
    ign.value=d.ign;
    uid.value=d.uid;
    matches.value=d.matches;
    kills.value=d.kills;

    detailsPopup.style.display="flex";
  });
}

</script>

</body>
</html>
