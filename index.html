<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE SCRIMS</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 🔥 MAIN CONTAINER -->
    <div class="container">

        <!-- 🔥 LOGO WITH BULLET EFFECT -->
        <div class="logo-container">
            <h1 class="logo">
                IGNITE SCRIMS
                <span class="bullet"></span>
            </h1>
        </div>

        <!-- TAGLINE -->
        <p class="tagline">
            Play tournaments. Win real money.
        </p>

        <!-- BUTTONS -->
        <div class="buttons">
            <button class="primary-btn" onclick="startPlaying()">🚀 Start Playing</button>
            <button class="secondary-btn">🔐 Login with Google</button>
        </div>

    </div>

    <!-- 🔥 ONBOARDING POPUP -->
    <div id="onboarding" class="onboarding hidden">

        <div class="popup">

            <!-- TOP BAR -->
            <div class="popup-top">
                <span onclick="prevStep()">←</span>
                <span onclick="closeOnboarding()">❌</span>
            </div>

            <!-- CONTENT -->
            <h2 id="step-title">Welcome 🔥</h2>
            <p id="step-text">Play tournaments and win real money.</p>

            <!-- BUTTONS -->
            <div class="popup-buttons">
                <button onclick="prevStep()">Back</button>
                <button onclick="nextStep()">Next</button>
            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="js/main.js"></script>
    <script src="js/onboarding.js"></script>

</body>
</html>
