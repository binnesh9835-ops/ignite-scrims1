<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignite Scrims</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0f1a;color:#fff;}
.container{max-width:420px;margin:auto;}

.header{
  display:flex;justify-content:center;align-items:center;
  gap:10px;padding:14px;background:#020617;
}
.brand{
  font-size:18px;font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{0%{background-position:0%}100%{background-position:300%}}

.line{
  height:2px;width:60px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  animation:glow 2s infinite;
}
@keyframes glow{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

.menu{display:flex;gap:8px;padding:10px;align-items:center;overflow-x:auto;}
.tab{padding:10px;border:none;background:#1e293b;color:white;border-radius:8px;cursor:pointer;}
.tab.active{background:#22c55e;}

.auth-btn{
  margin-left:auto;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.section{display:none;padding:15px;}
.section.active{display:block;}

.card{
  background:#111827;padding:15px;border-radius:12px;
  box-shadow:0 0 12px rgba(34,197,94,0.3);
}

.btn{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:8px;background:#22c55e;color:white;
}

.input{
  width:100%;padding:10px;margin-top:10px;
  border:none;border-radius:6px;
}

/* POPUP */
.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.popup-box{
  background:#111827;padding:20px;border-radius:12px;width:90%;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="line"></div>
  <div class="brand">IGNITE SCRIMS</div>
  <div class="line"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="matches">Matches</button>
  <button class="tab" data-tab="wallet">Wallet</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button class="auth-btn" id="authBtn">Login</button>
</div>

<!-- SECTIONS -->
<div id="home" class="section active"><div class="card"><h2>🔥 Welcome Gamer</h2></div></div>

<div id="matches" class="section">
  <div class="card"><h3>🎮 Matches</h3><button class="btn">Join Match</button></div>
</div>

<div id="wallet" class="section">
  <div class="card"><h3>💰 Wallet</h3></div>
</div>

<div id="profile" class="section">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="profileData">Login karo</div>
  </div>
</div>

</div>

<!-- DETAILS POPUP -->
<div class="popup" id="detailsPopup">
  <div class="popup-box">
    <h3>Complete Profile</h3>
    <input class="input" id="name" placeholder="Full Name">
    <input class="input" id="phone" placeholder="+91 Phone Number">
    <input class="input" id="email" readonly>
    <button class="btn" onclick="saveDetails()">Save</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">

// 🔥 IMPORTANT: APNA CONFIG YAHA DAAL
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

  /* TAB FIX */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

/* LOGIN BUTTON */
const authBtn = document.getElementById("authBtn");

authBtn.addEventListener("click", async ()=>{

  if(authBtn.innerText === "Logout"){
    location.reload();
    return;
  }

  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    document.getElementById("email").value = user.email;
    document.getElementById("detailsPopup").style.display="flex";

  }catch(err){
    alert("Login Failed");
  }
});

/* SAVE DETAILS */
window.saveDetails = async function(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  if(!name || !phone){
    alert("Fill all fields");
    return;
  }

  await setDoc(doc(db,"users",email),{
    name, phone, email
  });

  document.getElementById("profileData").innerHTML =
    <p>${name}</p><p>${phone}</p><p>${email}</p>;

  authBtn.innerText="Logout";
  document.getElementById("detailsPopup").style.display="none";
};

</script>

</body>
</html>
