<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IGNITE SCRIMS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- HEADER -->

<header class="header">

<h1 class="logo">IGNITE SCRIMS</h1>

<div class="profile-btn" id="profileBtn">
Login
</div>

</header>



<!-- MATCH FEED -->

<section class="matches-section">

<h2 class="section-title">Upcoming Matches</h2>

<div id="matchesContainer"></div>

</section>



<!-- TOP PLAYERS -->

<section class="leaderboard">

<h2 class="section-title">🔥 Top Players</h2>

<div id="topPlayers"></div>

</section>



<!-- PROFILE POPUP -->

<div class="profile-modal" id="profileModal">

<div class="profile-content">

<span class="close-btn" id="closeProfile">X</span>

<h2>User Profile</h2>

<p>Username</p>

</div>

</div>



<!-- ADMIN PANEL -->

<div id="adminPanel" style="display:none">

<h2>Admin Panel</h2>

</div>



<!-- SUPPORT BUTTON -->

<div class="support-btn" id="supportBtn">
💬
</div>



<!-- JOIN MATCH POPUP SYSTEM -->

<div id="joinPopup" class="join-popup">

<div class="join-box">

<!-- STEP 1 RULES -->

<div id="stepRules">

<h3>Match Rules</h3>

<p id="matchRulesText">
Rules will appear here
</p>

<button id="agreeBtn">YES, I AGREE</button>

</div>



<!-- STEP 2 PLAYER INFO -->

<div id="stepPlayer" style="display:none">

<button class="backBtn" id="backToRules">← Back</button>

<h3>Player Details</h3>

<input id="joinIGN" placeholder="IGN">

<input id="joinUID" placeholder="Game UID">

<input id="joinLevel" placeholder="Level">

<button id="nextToPayment">Next</button>

</div>



<!-- STEP 3 PAYMENT -->

<div id="stepPayment" style="display:none">

<button class="backBtn" id="backToPlayer">← Back</button>

<h3>Payment</h3>

<p>Send payment to:</p>

<p id="upiId">9279072936@axl</p>

<p>Entry Fee: ₹<span id="entryFee">0</span></p>

<input id="upiRef" placeholder="UPI Reference ID">

<button id="submitJoin">Submit</button>

<p id="joinStatus"></p>

</div>

</div>

</div>



<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="matches.js"></script>
<script src="profile.js"></script>
<script src="admin.js"></script>
<script src="xp.js"></script>
<script src="support.js"></script>

</body>
</html>
