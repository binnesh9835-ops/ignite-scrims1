<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ignite Scrims</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

.title{
font-size:44px;
margin-top:20px;
letter-spacing:5px;
font-weight:bold;

background:linear-gradient(
90deg,
#ff0000,
#ff7b00,
#ffe600,
#ffffff,
#ffe600,
#ff7b00,
#ff0000
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 5s linear infinite;

text-shadow:
0 0 10px #ff0000,
0 0 20px #ff7300,
0 0 30px #ff0000,
0 0 40px #ff7300;
}

@keyframes shine{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}

.loginBtn{
position:absolute;
top:20px;
right:20px;
padding:8px 16px;
border:none;
background:orange;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.menu{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
}

.menu button{
padding:10px 15px;
border:none;
background:#222;
color:white;
border-radius:20px;
cursor:pointer;
}

.menu button.active{
background:orange;
color:black;
}

.section{
display:none;
margin-top:40px;
}

.section.active{
display:block;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popupBox{
background:#1a1a1a;
padding:30px;
border-radius:10px;
}

.support{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#2aa7ff;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
}

</style>

</head>

<body>

<h1 class="title">IGNITE SCRIMS</h1>

<button id="loginBtn" class="loginBtn">
Login
</button>


<div class="menu">

<button class="tab active" data-tab="home">
Home
</button>

<button class="tab" data-tab="matches">
Matches
</button>

<button class="tab" data-tab="wallet">
Wallet
</button>

<button class="tab" data-tab="profile">
Profile
</button>

</div>


<div id="home" class="section active"></div>

<div id="matches" class="section"></div>

<div id="wallet" class="section"></div>

<div id="profile" class="section"></div>



<div id="loginPopup" class="popup">

<div class="popupBox">

<h3>Login</h3>

<button id="googleLogin">
Login with Google
</button>

<br><br>

<button onclick="closeLogin()">
Back
</button>

</div>

</div>



<div id="usernamePopup" class="popup">

<div class="popupBox">

<h3>Create Username</h3>

<input id="newUsername" placeholder="Enter Username">

<br><br>

<button onclick="saveUsername()">
Save
</button>

</div>

</div>



<div class="support" onclick="openSupport()">
💬
</div>



<script>

const tabs=document.querySelectorAll(".tab")

tabs.forEach(tab=>{

tab.onclick=()=>{

document.querySelector(".menu .active").classList.remove("active")

tab.classList.add("active")

document.querySelector(".section.active").classList.remove("active")

document.getElementById(tab.dataset.tab).classList.add("active")

}

})


function openSupport(){

window.open("https://t.me/IgniteScrimsFF_Support")

}


function closeLogin(){

document.getElementById("loginPopup").style.display="none"

}


document.getElementById("loginBtn").onclick=()=>{

document.getElementById("loginPopup").style.display="flex"

}

</script>



<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/auth.js"></script>

<script type="module" src="js/profile.js"></script>

<script type="module" src="js/wallet.js"></script>

<script type="module" src="js/matches.js"></script>

<script type="module" src="js/home.js"></script>

<script type="module" src="js/notifications.js"></script>

<script type="module" src="js/admin.js"></script>


</body>

</html>
