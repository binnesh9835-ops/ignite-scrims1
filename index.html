<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Scrims Panel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b0f1a;
  color:#fff;
}

/* MENU (Mobile First) */
.menu{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
  background:#020617;
}

.tab{
  flex-shrink:0;
  padding:10px 14px;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}

/* ACTIVE TAB */
.tab.active{
  background:#22c55e;
}

/* SECTIONS */
.section{
  display:none;
  padding:15px;
}

.section.active{
  display:block;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  font-size:14px;
}

/* DESKTOP VIEW */
@media(min-width:768px){

  body{
    display:flex;
    justify-content:center;
  }

  .container{
    width:420px;
  }

}
</style>
</head>

<body>

<div class="container">

<!-- MENU -->
<div class="menu">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="profile">Profile</button>

  <button class="tab" id="adminTab" data-tab="admin" style="display:none;">
    Admin
  </button>

  <button class="tab" id="ownerTab" data-tab="owner" style="display:none;">
    Owner
  </button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>🎮 Welcome Gamer</h2>
    <p style="margin-top:10px;">Scrims system ready hai 🔥</p>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="card">
    <h3>Profile</h3>
    <p style="margin-top:10px;">Name: Vishal</p>
    <p>Coins: 100</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="section">
  <div class="card">
    <h3>Admin Panel</h3>

    <button class="btn">Approve Add Money</button>
    <button class="btn">Approve Withdraw</button>
    <button class="btn">Create Match</button>
    <button class="btn">View Users</button>
  </div>
</div>

<!-- OWNER PANEL -->
<div id="owner" class="section">
  <div class="card">
    <h3>Owner Panel</h3>

    <button class="btn">Full Control</button>
    <button class="btn">Manage Admins</button>
    <button class="btn">All Transactions</button>
  </div>
</div>

</div>

<script>

/* TAB SWITCH */
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{

    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const target = tab.getAttribute("data-tab");

    sections.forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  });
});

/* ROLE SYSTEM */
function updateRoleUI(){

  const role = localStorage.getItem("userRole");

  const adminTab = document.getElementById("adminTab");
  const ownerTab = document.getElementById("ownerTab");

  if(role === "admin"){
    adminTab.style.display="block";
  }

  if(role === "owner"){
    adminTab.style.display="block";
    ownerTab.style.display="block";
  }
}

updateRoleUI();

/* QUICK TEST BUTTON (optional) */
function setRole(role){
  localStorage.setItem("userRole", role);
  location.reload();
}

</script>

</body>
</html>
