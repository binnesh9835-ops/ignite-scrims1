<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="logo">Profile</div>

<div class="card">

    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email" disabled>

    <div class="phone-box">
        <span>+91</span>
        <input type="number" placeholder="Phone Number">
    </div>

    <input type="text"
    placeholder="In Game Name (exact copy paste)">

    <input type="text"
    placeholder="UPI ID">

    <input type="text"
    placeholder="UPI Name (e.g. Akash)">

    <button class="play-btn">Save Profile</button>

</div>

<div class="card">

    <div class="info-box">About Us</div>
    <div class="info-box">Contact: @IgniteScrimsFF_Support</div>
    <div class="info-box">Privacy Policy</div>
    <div class="info-box">Terms & Conditions</div>

    <button class="play-btn">Logout</button>

</div>

</body>
</html>
