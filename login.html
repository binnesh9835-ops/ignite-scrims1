<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IGNITE SCRIMS</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔐 LOGIN CONTAINER -->
    <div class="login-container">

        <h1 class="logo">IGNITE SCRIMS</h1>
        <p class="tagline">Login to continue</p>

        <button class="play-btn" onclick="googleLogin()">
            Continue with Google
        </button>

    </div>

    <!-- 🎉 WELCOME POPUP -->
    <div id="welcomePopup" class="popup hidden">

        <div class="popup-box">

            <!-- TOP BAR -->
            <div class="popup-top">
                <span></span>
                <span onclick="closePopup()">❌</span>
            </div>

            <h2>🔥 Welcome to IGNITE SCRIMS</h2>

            <p style="margin-top:10px;">
                Play matches, get kills, and earn real money 💰
            </p>

            <button class="play-btn" onclick="closePopup()" style="margin-top:15px;">
                Got It
            </button>

        </div>

    </div>

    <!-- 🔥 FIREBASE CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

    <!-- 🔥 YOUR JS FILES -->
    <script src="firebase.js"></script>
    <script src="app.js"></script>

</body>
</html>
