<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - IGNITE SCRIMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h1 class="logo">IGNITE SCRIMS</h1>
    <p>Login to continue</p>

    <button class="play-btn" onclick="googleLogin()">
        Continue with Google
    </button>

</div>

<!-- 🔥 WELCOME POPUP -->
<div id="welcomePopup" class="popup hidden">
    <div class="popup-box">
        <h2>🔥 Welcome to IGNITE SCRIMS</h2>
        <p>Play matches. Get kills. Earn money 💰</p>
        <button onclick="closePopup()">Got It</button>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgyT_wRam-8FWkq5VePffFtymUMbRnXCQ",
  authDomain: "ignite-scrims.firebaseapp.com",
  projectId: "ignite-scrims",
  storageBucket: "ignite-scrims.firebasestorage.app",
  messagingSenderId: "497561769270",
  appId: "1:497561769270:web:ef4f215a253e984f2dcf97"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

function googleLogin() {
    auth.signInWithPopup(provider)
    .then((result) => {
        let isNewUser = result.additionalUserInfo.isNewUser;

        if (isNewUser) {
            document.getElementById("welcomePopup").classList.remove("hidden");
        } else {
            window.location.href = "dashboard.html";
        }
    })
    .catch((error) => {
        alert(error.message);
    });
}

function closePopup() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
