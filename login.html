<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IGNITE SCRIMS</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔐 LOGIN CONTAINER -->
<div class="login-container">

    <h1 class="logo">IGNITE SCRIMS</h1>
    <p class="tagline">Login to continue</p>

    <button class="play-btn" onclick="googleLogin()">
        Continue with Google
    </button>

</div>

<!-- 🎉 WELCOME POPUP -->
<div id="welcomePopup" class="popup hidden">

    <div class="popup-box">

        <!-- TOP BAR -->
        <div class="popup-top">
            <button onclick="goBack()" class="back-btn">←</button>
            <button onclick="closePopup()" class="close-btn">✖</button>
        </div>

        <h2>🔥 Welcome to IGNITE SCRIMS</h2>

        <p class="popup-text">
            Compete in matches, get kills and earn real money 💰
        </p>

        <button class="play-btn" onclick="closePopup()">
            Continue
        </button>

    </div>

</div>

<!-- 🔥 MODULE JS (IMPORTANT) -->
<script type="module" src="js/app.js"></script>

<script>
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
